ShortDescription: System-tray app for Hyper-V VM network auto-switching and power control.
Description: >-
  A lightweight Windows system-tray app that automatically connects a Hyper-V VM to the
  correct virtual switch based on the host's active network, and controls VM power state
  (start, shutdown, pause, resume, save) plus a live dashboard from the tray. The app
  requires administrator rights at runtime.
